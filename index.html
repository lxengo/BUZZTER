<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BUZZTER (バズター) - 何をしても万バズするSNS</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Canvas Confetti for celebration -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #000000;
      color: #e7e9ea;
    }
    /* 虹色の背景 */
    .rainbow-bg {
      background: linear-gradient(45deg, #ff007f, #ff7f00, #ff00ff, #00ffff, #8b00ff);
      background-size: 200% 200%;
      animation: rainbow-anim 8s ease infinite;
    }
    @keyframes rainbow-anim {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* カスタムスクロールバー */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #000000;
    }
    ::-webkit-scrollbar-thumb {
      background: #2f3336;
      border-radius: 3px;
    }
    /* トーストアニメーション */
    @keyframes slide-in {
      from { transform: translateY(100%) translateX(-50%); opacity: 0; }
      to { transform: translateY(0) translateX(-50%); opacity: 1; }
    }
    .toast-animate {
      animation: slide-in 0.2s ease forwards;
    }
  </style>
</head>
<body class="min-h-screen flex justify-center overflow-y-scroll">

  <!-- アプリメインコンテナ (Xモバイル幅) -->
  <div id="app" class="w-full max-w-lg min-h-screen bg-black border-x border-[#2f3336] flex flex-col relative pb-16">
    
    <!-- ==========================================
         1. スタート画面 (初期セットアップ)
         ========================================== -->
    <div id="setup-screen" class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center p-6">
      <!-- 虹色の炎アイコン -->
      <div class="w-20 h-20 rounded-2xl rainbow-bg p-0.5 flex items-center justify-center shadow-lg shadow-pink-500/20 mb-6">
        <div class="w-full h-full rounded-[14px] flex items-center justify-center bg-black/10 backdrop-blur-xs">
          <!-- 白い炎のSVG -->
          <svg class="w-12 h-12 text-white drop-shadow-[0_2px_8px_rgba(255,255,255,0.8)]" fill="currentColor" viewBox="0 0 24 24">
            <path d="M17.684 10.384c-.477-.872-1.047-1.634-1.684-2.284-.66-.675-1.425-1.253-2.25-1.71C12.518 5.672 11.2 5 10 5a.5.5 0 0 0-.414.78c.365.553.593 1.25.593 2.053 0 1.947-1.267 3.667-3.141 4.25-.873.27-1.696.822-2.316 1.57A6.471 6.471 0 0 0 3.5 18c0 3.314 2.686 6 6 6 2.074 0 3.907-.63 5.378-1.73a7.487 7.487 0 0 0 4.122-6.77c0-2.072-.486-3.865-1.316-5.116zM10 22a4 4 0 0 1-4-4c0-.987.355-1.892.946-2.593A1.488 1.488 0 0 1 8 15c.552 0 1 .448 1 1v1a1 1 0 0 0 2 0v-4.5a.5.5 0 0 1 .844-.365c1.458 1.413 2.156 3.142 2.156 4.865 0 2.21-1.79 4-4 4z"/>
          </svg>
        </div>
      </div>

      <h1 class="text-3xl font-black text-white mb-1 tracking-tight">BUZZTER に参加する</h1>
      <p class="text-[#71767b] text-sm mb-8 text-center">何を書いでも、どんな画像を上げても確実にバズる<br>究極の承認欲求チャージSNS。</p>

      <div class="w-full space-y-5 bg-[#16181c] p-6 rounded-2xl border border-[#2f3336]">
        <!-- アカウント画像設定 (クロッピングなし) -->
        <div>
          <label class="block text-xs font-bold text-[#71767b] mb-2 uppercase tracking-wider">プロフィール画像</label>
          <div class="flex items-center space-x-4">
            <div id="setup-avatar-preview" class="w-16 h-16 rounded-full overflow-hidden bg-slate-900 border-2 border-pink-500 flex items-center justify-center">
              <span class="text-2xl" id="avatar-emoji">🔥</span>
            </div>
            <div>
              <input type="file" id="avatar-input" accept="image/*" class="hidden">
              <button onclick="document.getElementById('avatar-input').click()" class="px-4 py-2 bg-white hover:bg-neutral-200 text-black text-xs font-bold rounded-full transition">
                端末から選択
              </button>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-[#71767b] mb-1.5 uppercase tracking-wider">名前</label>
          <input type="text" id="setup-name" value="バズり散らかすマン" class="w-full bg-black border border-[#2f3336] focus:border-pink-500 rounded-lg px-4 py-3 text-white text-sm focus:outline-none transition">
        </div>

        <div>
          <label class="block text-xs font-bold text-[#71767b] mb-1.5 uppercase tracking-wider">ユーザー名 (@)</label>
          <input type="text" id="setup-username" value="buzz_master" class="w-full bg-black border border-[#2f3336] focus:border-pink-500 rounded-lg px-4 py-3 text-white text-sm focus:outline-none transition">
        </div>

        <button onclick="startApp()" class="w-full py-3.5 bg-white hover:bg-neutral-200 text-black font-bold rounded-full shadow-lg transition text-center flex items-center justify-center space-x-2">
          <span>バズる準備は完了</span>
          <i data-lucide="arrow-right" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- ==========================================
         2. アプリケーションヘッダー
         ========================================== -->
    <header id="main-header" class="sticky top-0 z-30 bg-black/80 backdrop-blur-md border-b border-[#2f3336] px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <!-- 虹炎アプリロゴ -->
        <div class="w-8 h-8 rounded-lg rainbow-bg p-0.5 flex items-center justify-center">
          <div class="w-full h-full rounded-[7px] flex items-center justify-center bg-black bg-opacity-10">
            <svg class="w-4.5 h-4.5 text-white" fill="currentColor" viewBox="0 0 24 24">
              <path d="M17.684 10.384c-.477-.872-1.047-1.634-1.684-2.284-.66-.675-1.425-1.253-2.25-1.71C12.518 5.672 11.2 5 10 5a.5.5 0 0 0-.414.78c.365.553.593 1.25.593 2.053 0 1.947-1.267 3.667-3.141 4.25-.873.27-1.696.822-2.316 1.57A6.471 6.471 0 0 0 3.5 18c0 3.314 2.686 6 6 6 2.074 0 3.907-.63 5.378-1.73a7.487 7.487 0 0 0 4.122-6.77c0-2.072-.486-3.865-1.316-5.116zM10 22a4 4 0 0 1-4-4c0-.987.355-1.892.946-2.593A1.488 1.488 0 0 1 8 15c.552 0 1 .448 1 1v1a1 1 0 0 0 2 0v-4.5a.5.5 0 0 1 .844-.365c1.458 1.413 2.156 3.142 2.156 4.865 0 2.21-1.79 4-4 4z"/>
            </svg>
          </div>
        </div>
        <span class="text-lg font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-cyan-400">BUZZTER</span>
      </div>
      <span id="header-tab-title" class="text-sm font-bold text-white">ホーム</span>
      <div onclick="switchTab('profile')" class="flex items-center space-x-2 cursor-pointer group">
        <img id="header-avatar" src="" alt="avatar" class="w-7 h-7 rounded-full border border-pink-500 object-cover">
      </div>
    </header>

    <!-- ==========================================
         3. メインコンテンツエリア
         ========================================== -->
    <main class="flex-1">
      
      <!-- [タブ1] タイムライン -->
      <div id="tab-home" class="tab-content">
        <!-- クイックポスト作成エリア -->
        <div class="p-4 border-b border-[#2f3336] flex space-x-3 bg-black">
          <img id="post-avatar" src="" alt="avatar" class="w-10 h-10 rounded-full border border-pink-500 object-cover flex-shrink-0">
          <div class="flex-1">
            <textarea id="home-post-input" placeholder="いまどうしてる？（指示通りの画像生成や、完全一致の爆笑リプライが届くよ！）" class="w-full bg-transparent border-none text-white placeholder-[#71767b] focus:ring-0 resize-none text-lg outline-none min-h-[50px]" rows="2"></textarea>
            
            <!-- 添付画像プレビュー (クロップなし) -->
            <div id="home-attachment-preview-container" class="hidden relative mt-2 rounded-2xl overflow-hidden border border-[#2f3336] bg-[#16181c]">
              <img id="home-attachment-preview" src="" class="w-full h-auto max-h-96 object-contain mx-auto">
              <button onclick="removeHomeAttachment()" class="absolute top-2 right-2 p-1.5 bg-black/70 hover:bg-black rounded-full text-white transition">
                <i data-lucide="x" class="w-4 h-4"></i>
              </button>
            </div>

            <div class="flex items-center justify-between border-t border-[#2f3336]/50 pt-3 mt-2">
              <div class="flex items-center space-x-1">
                <!-- 画像アップロード -->
                <button onclick="document.getElementById('post-image-input').click()" class="p-2 text-pink-500 hover:bg-pink-500/10 rounded-full transition" title="画像を添付">
                  <i data-lucide="image" class="w-5 h-5"></i>
                </button>
                <input type="file" id="post-image-input" accept="image/*" class="hidden">

                <!-- AI画像生成 -->
                <button onclick="triggerAIImageGeneration('home')" class="p-2 text-cyan-400 hover:bg-cyan-400/10 rounded-full transition flex items-center space-x-1" title="AIで指示通りの画像を作ります">
                  <i data-lucide="sparkles" class="w-5 h-5"></i>
                  <span class="text-xs font-bold hidden sm:inline">AI画像生成</span>
                </button>
              </div>
              <button onclick="createPost('home')" class="px-5 py-1.5 bg-pink-500 hover:bg-pink-600 text-white font-extrabold rounded-full text-sm transition">
                ポストする
              </button>
            </div>
          </div>
        </div>

        <!-- タイムライン更新お知らせ -->
        <div id="new-tweets-alert" class="hidden py-2 bg-pink-500 text-white text-center text-xs font-bold cursor-pointer hover:bg-pink-600 transition duration-200">
          ✨ 新しいタイムラインのポスト（タップしてタイムラインを更新）
        </div>

        <!-- タイムライン表示エリア -->
        <div id="feed" class="divide-y divide-[#2f3336]">
          <!-- 投稿がここに動的に追加されます -->
        </div>
      </div>

      <!-- [詳細画面] シングルポスト詳細表示 -->
      <div id="tab-post-detail" class="tab-content hidden">
        <div class="p-3 border-b border-[#2f3336] flex items-center space-x-4 bg-black sticky top-12 z-20">
          <button onclick="goBackToFeed()" class="p-1 hover:bg-[#16181c] rounded-full text-white transition">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
          </button>
          <span class="font-bold text-base text-white">ポストする</span>
        </div>

        <!-- ポスト詳細 -->
        <div id="detail-post-container" class="p-4 border-b border-[#2f3336]"></div>

        <!-- AIリプライスレッド -->
        <div class="bg-[#16181c]/10">
          <div class="px-4 py-3 border-b border-[#2f3336] text-xs font-bold text-[#71767b] uppercase tracking-wider">
            返信
          </div>
          <div id="detail-replies-list" class="divide-y divide-[#2f3336]"></div>
        </div>
      </div>

      <!-- [タブ2] 通知 -->
      <div id="tab-notifications" class="tab-content hidden">
        <div class="p-4 border-b border-[#2f3336] flex justify-between items-center bg-black">
          <h2 class="text-base font-bold text-white flex items-center space-x-2">
            <i data-lucide="bell" class="w-5 h-5 text-pink-500"></i>
            <span>通知</span>
          </h2>
          <button onclick="clearNotifications()" class="text-xs text-[#71767b] hover:text-white transition">すべて既読</button>
        </div>
        <div id="notifications-list" class="divide-y divide-[#2f3336]">
          <div id="no-notifications" class="p-8 text-center text-[#71767b]">
            <i data-lucide="bell-off" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
            <p class="text-sm">通知はまだありません。投稿してバズらせましょう！</p>
          </div>
        </div>
      </div>

      <!-- [タブ3] プロフィール -->
      <div id="tab-profile" class="tab-content hidden">
        <div class="h-28 bg-[#1e293b] relative">
          <div class="absolute inset-0 rainbow-bg opacity-20"></div>
        </div>
        
        <div class="px-4 pb-4 border-b border-[#2f3336] relative bg-black">
          <div class="absolute -top-10 left-4">
            <div class="relative group">
              <img id="profile-avatar" src="" alt="avatar" class="w-20 h-20 rounded-full border-4 border-black object-cover bg-black">
              <button onclick="document.getElementById('avatar-input').click()" class="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center text-white transition text-[10px] font-bold">
                変更
              </button>
            </div>
          </div>

          <div class="flex justify-end pt-3">
            <button onclick="openProfileEditModal()" class="px-4 py-1.5 border border-[#2f3336] hover:bg-[#16181c] text-white text-xs font-bold rounded-full transition">
              プロフィールを編集
            </button>
          </div>

          <div class="mt-4">
            <h2 id="profile-display-name" class="text-lg font-black text-white"></h2>
            <p id="profile-display-username" class="text-xs text-[#71767b]"></p>
            <p id="profile-bio" class="text-slate-200 text-sm mt-3 leading-relaxed"></p>
            
            <div class="flex items-center space-x-4 mt-3 text-xs text-[#71767b]">
              <div class="flex items-center space-x-1">
                <i data-lucide="calendar" class="w-3.5 h-3.5"></i>
                <span>2026年6月からBUZZTERを利用しています</span>
              </div>
            </div>

            <div class="flex items-center space-x-4 mt-3 text-xs">
              <span class="text-[#71767b]"><strong class="text-white font-bold">82</strong> フォロー中</span>
              <span class="text-[#71767b]"><strong id="profile-followers-count" class="text-white font-bold">128.5万</strong> フォロワー</span>
            </div>
          </div>
        </div>

        <!-- プロフィールインライン投稿エリア -->
        <div class="p-4 border-b border-[#2f3336] bg-black">
          <div class="flex space-x-3">
            <img id="profile-inline-avatar" src="" class="w-10 h-10 rounded-full border border-pink-500 object-cover flex-shrink-0">
            <div class="flex-1">
              <textarea id="profile-post-input" placeholder="ここからもポストできるよ！いまどうしてる？" class="w-full bg-transparent border-none text-white placeholder-[#71767b] focus:ring-0 resize-none text-sm outline-none min-h-[40px]" rows="2"></textarea>
              
              <div id="profile-attachment-preview-container" class="hidden relative mt-2 rounded-xl overflow-hidden border border-[#2f3336] bg-[#16181c]">
                <img id="profile-attachment-preview" src="" class="w-full h-auto max-h-64 object-contain mx-auto">
                <button onclick="removeProfileAttachment()" class="absolute top-2 right-2 p-1.5 bg-black/70 hover:bg-black rounded-full text-white transition">
                  <i data-lucide="x" class="w-4 h-4"></i>
                </button>
              </div>

              <div class="flex items-center justify-between mt-2 pt-2 border-t border-[#2f3336]">
                <div class="flex space-x-2">
                  <button onclick="document.getElementById('profile-image-input').click()" class="p-1.5 text-pink-500 hover:bg-pink-500/10 rounded-full transition">
                    <i data-lucide="image" class="w-4.5 h-4.5"></i>
                  </button>
                  <input type="file" id="profile-image-input" accept="image/*" class="hidden">
                  
                  <button onclick="triggerAIImageGeneration('profile')" class="p-1.5 text-cyan-400 hover:bg-cyan-400/10 rounded-full transition flex items-center space-x-1">
                    <i data-lucide="sparkles" class="w-4.5 h-4.5"></i>
                    <span class="text-[10px] font-bold">AI画像</span>
                  </button>
                </div>
                <button onclick="createPost('profile')" class="px-4 py-1.5 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-full text-xs transition">
                  ポストする
                </button>
              </div>
            </div>
          </div>
        </div>

        <div id="profile-feed" class="divide-y divide-[#2f3336]"></div>
      </div>

    </main>

    <!-- ==========================================
         4. AI画像生成モーダル (Pollinations AI)
         ========================================== -->
    <div id="ai-modal" class="hidden fixed inset-0 z-50 bg-black/95 flex items-center justify-center p-4">
      <div class="bg-[#16181c] w-full max-w-sm rounded-2xl border border-[#2f3336] overflow-hidden shadow-2xl">
        <div class="p-4 border-b border-[#2f3336] flex justify-between items-center bg-black/40">
          <h3 class="font-bold text-white flex items-center space-x-2">
            <i data-lucide="sparkles" class="w-5 h-5 text-cyan-400"></i>
            <span>AIで画像を作る</span>
          </h3>
          <button onclick="closeAIModal()" class="text-[#71767b] hover:text-white transition">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="p-4 space-y-4">
          <div>
            <label class="block text-xs font-bold text-[#71767b] mb-1.5 uppercase tracking-wide">何を描いてほしいですか？(プロンプト)</label>
            <textarea id="ai-prompt" placeholder="例: 宇宙を飛ぶ柴犬、ゲーム風、高画質、3D" class="w-full bg-black border border-[#2f3336] focus:border-cyan-400 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none transition" rows="3"></textarea>
          </div>
          
          <div id="ai-loading" class="hidden flex flex-col items-center justify-center py-6 space-y-3">
            <div class="w-10 h-10 border-4 border-cyan-400 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-[#71767b]">AIが最高の画像を生成しています...</p>
          </div>

          <div id="ai-preview-container" class="hidden">
            <p class="text-xs text-[#71767b] mb-2">生成された画像:</p>
            <div class="rounded-xl overflow-hidden border border-[#2f3336] bg-black">
              <img id="ai-preview-img" src="" class="w-full h-auto object-contain max-h-64 mx-auto">
            </div>
          </div>
        </div>
        <div class="p-4 border-t border-[#2f3336] flex space-x-3 bg-black/40">
          <button id="ai-generate-btn" onclick="generateAIImage()" class="flex-1 py-2.5 bg-cyan-500 text-black font-extrabold rounded-full text-sm hover:bg-cyan-400 transition flex items-center justify-center space-x-1 shadow-lg shadow-cyan-500/10">
            <i data-lucide="wand-2" class="w-4 h-4"></i>
            <span>生成する</span>
          </button>
          <button id="ai-apply-btn" onclick="applyAIImage()" class="hidden flex-1 py-2.5 bg-pink-500 text-white font-bold rounded-full text-sm hover:bg-pink-600 transition">この画像を使う</button>
        </div>
      </div>
    </div>

    <!-- ==========================================
         5. プロフィール編集モーダル
         ========================================== -->
    <div id="profile-edit-modal" class="hidden fixed inset-0 z-50 bg-black/80 flex items-center justify-center p-4">
      <div class="bg-[#16181c] w-full max-w-sm rounded-2xl border border-[#2f3336] overflow-hidden">
        <div class="p-4 border-b border-[#2f3336] flex justify-between items-center">
          <h3 class="font-bold text-white">プロフィールを編集</h3>
          <button onclick="closeProfileEditModal()" class="text-[#71767b] hover:text-white transition">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
        <div class="p-4 space-y-4 bg-black/20">
          <div>
            <label class="block text-xs font-bold text-[#71767b] mb-1.5 uppercase">表示名</label>
            <input type="text" id="edit-display-name" class="w-full bg-black border border-[#2f3336] focus:border-pink-500 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-bold text-[#71767b] mb-1.5 uppercase">ユーザー名 (@)</label>
            <input type="text" id="edit-username" class="w-full bg-black border border-[#2f3336] focus:border-pink-500 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none transition">
          </div>
          <div>
            <label class="block text-xs font-bold text-[#71767b] mb-1.5 uppercase">自己紹介</label>
            <textarea id="edit-bio" class="w-full bg-black border border-[#2f3336] focus:border-pink-500 rounded-xl px-4 py-2.5 text-white text-sm focus:outline-none transition" rows="3"></textarea>
          </div>
        </div>
        <div class="p-4 border-t border-[#2f3336] flex space-x-3 bg-black/40">
          <button onclick="closeProfileEditModal()" class="flex-1 py-2.5 bg-transparent border border-[#2f3336] text-[#e7e9ea] font-bold rounded-full text-sm transition">キャンセル</button>
          <button onclick="saveProfileEdit()" class="flex-1 py-2.5 bg-pink-500 hover:bg-pink-600 text-white font-bold rounded-full text-sm transition">保存</button>
        </div>
      </div>
    </div>

    <!-- ==========================================
         6. ボトムナビゲーション (Xを模倣)
         ========================================== -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-lg bg-black/90 backdrop-blur-md border-t border-[#2f3336] flex justify-around py-3.5 z-30">
      <button onclick="switchTab('home')" id="nav-home" class="flex flex-col items-center text-pink-500 transition-colors">
        <i data-lucide="home" class="w-6 h-6"></i>
      </button>
      <button onclick="switchTab('notifications')" id="nav-notifications" class="flex flex-col items-center text-[#71767b] hover:text-white transition-colors relative">
        <i data-lucide="bell" class="w-6 h-6"></i>
        <span id="notification-badge" class="hidden absolute top-0 right-1 w-2.5 h-2.5 bg-pink-500 rounded-full text-[9px] font-bold text-white flex items-center justify-center"></span>
      </button>
      <button onclick="switchTab('profile')" id="nav-profile" class="flex flex-col items-center text-[#71767b] hover:text-white transition-colors">
        <i data-lucide="user" class="w-6 h-6"></i>
      </button>
    </nav>

        navBtn.classList.remove('text-[#71767b]');

      const tabTitles = { home: 'ホーム', notifications: '通知', profile: 'プロフィール' };
      document.getElementById('header-tab-title').innerText = tabTitles[tabId] || 'BUZZTER';

      if (tabId === 'notifications') {
        unreadNotificationsCount = 0;
        updateNotificationBadge();
        renderNotifications();
      }
      if (tabId === 'profile') {
        renderProfileFeed();
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });

    function formatNumber(num) {
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num;
    }

    // ==========================================
    // 新規ポスト作成 (あなただけが超万バズ)
    // ==========================================
    function createPost(source) {
      const textarea = document.getElementById(`${source}-post-input`);
      const content = textarea.value.trim();
      const attachedImage = source === 'home' ? attachedImageHome : attachedImageProfile;

      if (!content && !attachedImage) {
        showToast("⚠️ ポストする内容または画像が必要です！");
        return;
      }

      const newPostId = 'post-' + Date.now();
      const newPost = {
        id: newPostId,
        user: { ...currentUser },
        content: content,
        image: attachedImage,
        likes: 0,
        reposts: 0,
        views: 0,
        replies: [],
        timestamp: "たった今",
        isLiked: false,
        isReposted: false
      };

      posts.unshift(newPost);
      renderFeed();
      if (!document.getElementById('tab-profile').classList.contains('hidden')) {
        renderProfileFeed();
      }

      textarea.value = '';
      if (source === 'home') {
        removeHomeAttachment();
      } else {
        removeProfileAttachment();
      }

      window.scrollTo({ top: 0, behavior: 'smooth' });

      startMegaBuzz(newPostId, content, attachedImage);
    }

    function startMegaBuzz(postId, content, image) {
      showToast("🚀 あなたの神ポストがアルゴリズムによって拡散開始！");

      confetti({
        particleCount: 150,
        spread: 80,
        origin: { y: 0.6 }
      });

      let views = 0;
      let reposts = 0;
      let likes = 0;

      const targetViews = Math.floor(Math.random() * 400000) + 600000;
      const targetReposts = Math.floor(targetViews * (Math.random() * 0.04 + 0.02));
      const targetLikes = Math.floor(targetViews * (Math.random() * 0.12 + 0.08));

      const duration = 6000;
      const startTime = Date.now();

      function updateCounters() {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeOutQuad = 1 - (1 - progress) * (1 - progress);

        views = Math.floor(easeOutQuad * targetViews);
        reposts = Math.floor(easeOutQuad * targetReposts);
        likes = Math.floor(easeOutQuad * targetLikes);

        const viewsEl = document.getElementById(`views-${postId}`);
        const repostsEl = document.getElementById(`reposts-${postId}`);
        const likesEl = document.getElementById(`likes-${postId}`);

        if (viewsEl) viewsEl.innerText = formatNumber(views);
        if (repostsEl) repostsEl.innerText = formatNumber(reposts);
        if (likesEl) likesEl.innerText = formatNumber(likes);

        const viewsDetailEl = document.getElementById(`views-detail-${postId}`);
        const repostsDetailEl = document.getElementById(`reposts-detail-${postId}`);
        const likesDetailEl = document.getElementById(`likes-detail-${postId}`);

        if (viewsDetailEl) viewsDetailEl.innerText = formatNumber(views);
        if (repostsDetailEl) repostsDetailEl.innerText = formatNumber(reposts);
        if (likesDetailEl) likesDetailEl.innerText = formatNumber(likes);

        const post = posts.find(p => p.id === postId);
        if (post) {
          post.views = views;
          post.reposts = reposts;
          post.likes = likes;
        }

        if (progress < 1) {
          requestAnimationFrame(updateCounters);
        } else {
          confetti({
            particleCount: 120,
            spread: 120,
            colors: ['#ff007f', '#ff00ff', '#00ffff']
          });
          showToast("🔥 バズりが頂点に達しました！世界にトレンド入り！");
        }
      }

      requestAnimationFrame(updateCounters);
      generateAIReplies(postId, content, image);
    }

    // ==========================================
    // 【書き換え完了】Cloudflare Workers経由でGemini AI返信を完全取得
    // ==========================================
    async function generateAIReplies(postId, userPostContent, imageSrc) {
      const systemPrompt = `
        あなたは、今ものすごくバズっているSNS(旧Twitter/X)のポストに対してリアルタイムで反応する、個性豊かでユーモア溢れる一般の日本人ユーザーたちです。
        提供されたユーザーのポストテキスト、および添付画像情報を完全に読み込み、内容に【100%完全にマッチした】、リアルでユニークな日本語のリプライを「5件」作成してください。
        
        【キャラクター5名の異なる属性】
        1. 「激しい共感・大爆笑派」: 現代のネットスラング（草、それな、天才すぎる、腹痛い、など）を自然に散りばめ、投稿内容に猛烈にツボる。
        2. 「おもしろ大喜利ツッコミ派」: 投稿内容や添付画像に対して、ウィットに富んだ角度からたとえツッコミや面白いツッコミを入れる。
        3. 「真面目に感動するファン」: 言語化能力が非常に高く、投稿の本質を優しくかつ深く絶賛・共感する。
        4. 「少しおせっかい・便乗派」: 『この流れで便乗して私の愛猫も置いておきますね』など、バズった時ならではの便乗リプライ。
        5. 「海外の興奮したニキ（日本語翻訳風または英語）」: 英語や、愛嬌のある機械翻訳風の日本語で熱狂的に愛と賛辞を送る海外アカウント。

        【重要ルール】
        - 投稿内容が「真面目なネタ」「おもしろいネタ」「美しいイラスト画像」など、何であれ【文脈に完璧に合致した返信】にすること。
        - 添付画像情報がある場合は、画像に描かれている内容（例：猫、宇宙、ラーメンなど）に対しても、必ずリプライ内で具体的に触れてください。
        
        【出力形式】
        必ず以下の構成を持つJSONオブジェクトの配列（ARRAY）としてのみ出力してください。バッククォートなどのマークダウン装飾、解説、余計なテキストは一切含んではいけません。完璧なプレーンJSONのみを返してください。
        [
          {
            "name": "アカウント名(日本語)",
            "username": "英数字ユーザーID",
            "emoji": "ふさわしい絵文字1文字",
            "content": "完全文脈一致のリアルなリプライ本文",
            "color": "アバター用背景色HEX"
          },
          ...
        ]
      `;

      let promptText = `【今回のポスト内容】\nテキスト: "${userPostContent}"`;
      let payloadParts = [{ text: promptText }];

      // 画像情報の追加
      if (imageSrc) {
        if (imageSrc.startsWith('data:image')) {
          const base64Data = imageSrc.split(',')[1];
          promptText += `\n(画像ファイルが添付されています。画像の内容を見て感想を交えてください。)`;
          payloadParts = [
            { text: promptText },
            { inlineData: { mimeType: "image/png", data: base64Data } }
          ];
        } else {
          const imageDescription = lastUsedAIPrompt ? lastUsedAIPrompt : "ユーザーが指示したAI生成アート";
          promptText += `\n(AIによって生成された画像が添付されています。画像テーマ: "${imageDescription}"。画像の内容について詳しく言及してください。)`;
          payloadParts = [{ text: promptText }];
        }
      }

      const payloadContents = [{
        role: "user",
        parts: payloadParts
      }];

      try {
        // 先ほど作成したCloudflare WorkersのURLをここに入力
        const workerUrl = "https://buzzter.kengono0710.workers.dev";

        // Cloudflare Workers経由で安全に通信を送信
        const response = await fetch(workerUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: payloadContents,
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: {
              responseMimeType: "application/json",
              responseSchema: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    name: { type: "STRING" },
                    username: { type: "STRING" },
                    emoji: { type: "STRING" },
                    content: { type: "STRING" },
                    color: { type: "STRING" }
                  },
                  required: ["name", "username", "emoji", "content", "color"]
                }
              }
            }
          })
        });

        if (!response.ok) throw new Error("Workers通信エラー");
        
        const data = await response.json();
        let replies = [];

        if (data.candidates && data.candidates[0].content.parts[0].text) {
          const responseText = data.candidates[0].content.parts[0].text;
          let cleanJSON = responseText.replace(/```json/gi, '').replace(/```/g, '').trim();
          replies = JSON.parse(cleanJSON);
        } else {
          throw new Error("想定外のデータ構造");
        }

        deliverRepliesStepByStep(postId, replies);

      } catch (error) {
        console.error("Gemini AIリプライ取得失敗:", error);
        const fallbackReplies = getFallbackReplies(userPostContent);
        deliverRepliesStepByStep(postId, fallbackReplies);

    function deliverRepliesStepByStep(postId, replies) {
      replies.forEach((rep, index) => {

            username: rep.username,

          addNotification({

          showToast(`💬 @${rep.username} さんからリプライが届きました！`);

        }, (index + 1) * 2000 + (Math.random() * 800));
      });
    }

    function simulateLike(postId) {

      post.isLiked = !post.isLiked;

        post.likes += 1;

          angle: 60,
          spread: 55,
          origin: { x: 0 }

        post.likes -= 1;

        renderPostDetailContent(postId);
      } else {
        renderFeed();
        if (!document.getElementById('tab-profile').classList.contains('hidden')) {
          renderProfileFeed();
        }
      }
    }

    function simulateRepost(postId) {
      const post = posts.find(p => p.id === postId);

      post.isReposted = !post.isReposted;
      if (post.isReposted) {
        post.reposts += 1;
        showToast("🔁 ポストをリポストしました！");

    // ==========================================

    function setupAttachmentInputs() {
      document.getElementById('post-image-input').addEventListener('change', function(e) {
        handleFileSelect(e, 'home');
      });
      document.getElementById('profile-image-input').addEventListener('change', function(e) {
        handleFileSelect(e, 'profile');
      });
      document.getElementById('avatar-input').addEventListener('change', function(e) {
        handleFileSelect(e, 'avatar');
      });
    }

    function handleFileSelect(event, targetType) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        const imageResult = e.target.result;

        if (targetType === 'home') {
          attachedImageHome = imageResult;
          document.getElementById('home-attachment-preview').src = imageResult;
          document.getElementById('home-attachment-preview-container').classList.remove('hidden');
        } else if (targetType === 'profile') {
          attachedImageProfile = imageResult;
          document.getElementById('profile-attachment-preview').src = imageResult;
          document.getElementById('profile-attachment-preview-container').classList.remove('hidden');
        } else if (targetType === 'avatar') {
          currentUser.avatar = imageResult;
          document.getElementById('setup-avatar-preview').innerHTML = `<img src="${imageResult}" class="w-full h-full object-cover">`;
          document.getElementById('header-avatar').src = imageResult;
          document.getElementById('post-avatar').src = imageResult;
          document.getElementById('profile-avatar').src = imageResult;
          document.getElementById('profile-inline-avatar').src = imageResult;
          showToast("👤 プロフィール画像をそのままセットしました！");
        }
      };
      reader.readAsDataURL(file);
    }

      }

      currentUser.name = name;
      currentUser.username = username;
      currentUser.bio = bio;

      document.getElementById('profile-display-name').innerText = currentUser.name;
      document.getElementById('profile-display-username').innerText = '@' + currentUser.username;
      document.getElementById('profile-bio').innerText = currentUser.bio;

      closeProfileEditModal();
      showToast("💾 プロフィールを保存しました。");
      
      renderFeed();
      renderProfileFeed();
    }
  </script>
</body>
</html>
